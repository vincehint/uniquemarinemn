<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Marine Upcoming</title>
    <link rel="stylesheet" href="style.css?v=10">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="water-layer"></div>
    <div class="water-motion"></div>
    <div class="shimmer"></div>
    <div class="content">
        <h1>Coming Soon!</h1>
        <div class="carousel-wrapper">
            <div class="carousel-container">
                <div class="carousel-slide">
                    <img src="qllayout.jpg" alt="quad lounge layout" class="carousel-image" data-zoom="QL.png">
                    <img src="qlfeatures.jpg" alt="quad lounge specs" class="carousel-image" data-zoom="QL.png">
                    <img src="vrblayout.jpg" alt="vrb layout" class="carousel-image" data-zoom="vrb.png">
                    <img src="vrbfeatures.jpg" alt="vrb specs" class="carousel-image" data-zoom="vrb.png">
                    <img src="cruiselayout.jpg" alt="cruise layout" class="carousel-image" data-zoom="Cruise.png">
                    <img src="cruisefeatures.jpg" alt="cruice specs" class="carousel-image" data-zoom="Cruise.png">
                    <img src="rflayout.jpg" alt="rf layout" class="carousel-image" data-zoom="rf.png">
                    <img src="rffeatures.jpg" alt="rf specs" class="carousel-image" data-zoom="rf.png">
                </div>
            </div>
            <div class="carousel-menu">
                <button data-slide="0">QL Layout</button>
                <button data-slide="1">QL Features</button>
                <button data-slide="2">VRB Layout</button>
                <button data-slide="3">VRB Features</button>
                <button data-slide="4">Cruise Layout</button>
                <button data-slide="5">Cruise Features</button>
                <button data-slide="6">RF Layout</button>
                <button data-slide="7">RF Features</button>
            </div> 
            <div class="video-buttons">
                <button onclick="openVideo('https://www.youtube.com/embed/videoseries?list=PL4voBAuTjr8zZaMLJ5kD1gnv4T68SJ6Of')">
                    Check Out The Avalon Lineup
                </button>

                <button onclick="openVideo('https://www.youtube.com/embed/videoseries?list=PLCkOnvIgiaSLzZ3en58ovTqslxPwz9Mx4')">
                    Check Out The Premier Lineup
                </button>
            </div>
        </div>
    
        
        <button id="prevBtn" class="carousel-btn">Prev</button>
        <button id="nextBtn" class="carousel-btn">Next</button>
        
        <div id="layoutModal" class="modal">
            <span class="close">&times;</span>
            <img class="modal-content" id="modalImage">
        </div>

        <div id="videoModal" class="modal">
            <span class="close" onclick="closeVideo()">&times;</span>
            <iframe id="videoFrame" class="modal-content" allowfullscreen></iframe>
        </div>
    </div>

   

    <script src="script.js?v=10"></script>
</body>
</html>
